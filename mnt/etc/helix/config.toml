# /etc/helix/config.toml — system-wide Helix configuration

theme = "selenized_dark"

[editor]
line-number        = "relative"
cursorline         = true
color-modes        = true   # statusline mode indicator changes color per mode
mouse              = true
auto-save          = false
completion-timeout = 5
idle-timeout       = 200

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.indent-guides]
render    = true
character = "▏"

[editor.statusline]
left   = ["mode", "spacer", "diagnostics", "spacer", "file-name", "file-modification-indicator"]
center = []
right  = ["version-control", "spacer", "position", "spacer", "file-encoding", "file-type"]

[editor.whitespace.render]
space  = "all"
tab    = "all"
newline = "all"

[editor.file-picker]
hidden = true   # show dotfiles
