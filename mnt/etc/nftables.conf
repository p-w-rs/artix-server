#!/usr/sbin/nft -f

# /etc/nftables.conf — default workstation firewall
# Address family "inet" covers both IPv4 and IPv6.
# To reload at runtime: sv down nftables && sv up nftables
# To inspect live rules: nft list ruleset

flush ruleset

table inet filter {

    # ── Inbound traffic ──────────────────────────────────────────────────────
    chain input {
        type filter hook input priority filter; policy drop;

        # Allow loopback (localhost communication)
        iif lo accept

        # Allow traffic belonging to established or related connections
        ct state established,related accept

        # Drop invalid packets (e.g. spoofed, malformed)
        ct state invalid drop

        # Allow ICMPv4 (ping, destination-unreachable, etc.)
        ip protocol icmp accept

        # Allow ICMPv6 — required for IPv6 to function correctly
        # (neighbor discovery, router advertisements, etc.)
        ip6 nexthdr ipv6-icmp accept

        # Allow inbound SSH (22), HTTPS (443), Samba (139, 445) over TCP, NFS (111, 2049, 20048) over TCP
        tcp dport { 22, 139, 443, 445, 111, 2049, 20048 } accept
        # Allow inbound HTTPS/HTTP3/QUIC (443), Samba NetBIOS (137, 138) over UDP, NFS (111, 2049, 20048) over UDP
        udp dport { 137, 138, 443, 111, 2049, 20048 } accept

        # Everything else is dropped by the default policy above
    }

    # ── Forwarded traffic ────────────────────────────────────────────────────
    # This machine is not a router. Drop all forwarded packets.
    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    # ── Outbound traffic ─────────────────────────────────────────────────────
    # Allow all outbound by default.
    chain output {
        type filter hook output priority filter; policy accept;
    }

}
