[global]
    workgroup = WORKGROUP
    server string = powerslabs
    server role = standalone server
    log file = /var/log/samba/%m.log
    max log size = 50

    # Modern auth
    server min protocol = SMB2

    # mDNS-based discovery (makes it visible in macOS Finder sidebar)
    multicast dns register = yes

    # Keep Samba password in sync with Linux password
    unix password sync = yes
    pam password change = yes
    passwd program = /usr/bin/passwd %u

    [stuff]
        path = /mnt/stuff
        browseable = yes
        read only = no
        valid users = joshua
        force user = joshua
        create mask = 0644
        directory mask = 0755
        force create mode = 0644
        force directory mode = 0755
